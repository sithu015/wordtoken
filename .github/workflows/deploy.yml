name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45
    environment:
      name: production
      url: https://wordtoken.ygn.app

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          : "${DEPLOY_HOST:?Set repository variable DEPLOY_HOST}"
          : "${DEPLOY_SSH_KEY:?Set repository secret DEPLOY_SSH_KEY}"
          DEPLOY_PORT="${DEPLOY_PORT:-22}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync repository to server
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          : "${DEPLOY_HOST:?Set repository variable DEPLOY_HOST}"
          : "${DEPLOY_USER:?Set repository variable DEPLOY_USER}"
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/wordtoken}"

          rsync -az --delete \
            --exclude ".env" \
            --exclude ".git" \
            --exclude ".venv" \
            --exclude ".pytest_cache" \
            --exclude "__pycache__" \
            -e "ssh -p ${DEPLOY_PORT} -i ~/.ssh/id_ed25519" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Run remote deployment
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          : "${DEPLOY_HOST:?Set repository variable DEPLOY_HOST}"
          : "${DEPLOY_USER:?Set repository variable DEPLOY_USER}"
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/wordtoken}"
          SITE_URL="${SITE_URL:-https://wordtoken.ygn.app}"

          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' bash '${DEPLOY_PATH}/deploy/remote_deploy.sh'"

          curl -fsS "${SITE_URL}/health"
